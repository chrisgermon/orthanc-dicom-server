name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller

      - name: Build .exe
        working-directory: windows-installer
        run: |
          pyinstaller --onefile --windowed --name "OrthancStoreForwardSetup" --clean --noconfirm installer.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrthancStoreForwardSetup
          path: windows-installer/dist/OrthancStoreForwardSetup.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: windows-installer/dist/OrthancStoreForwardSetup.exe
